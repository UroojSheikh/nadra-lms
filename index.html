<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NADRA Digital Learning — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500;600;700&family=Noto+Nastaliq+Urdu:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="auth-shell">
  <div class="auth-side">
    <div class="brand"><span class="dot"></span><span data-en="NADRA Digital Learning" data-ur="نادرا ڈیجیٹل لرننگ">NADRA Digital Learning</span></div>
    <div class="quote">
      <span data-en="Every module completed is a step toward better public service."
            data-ur="ہر مکمل ہونے والا ماڈیول بہتر عوامی خدمت کی طرف ایک قدم ہے۔">
        Every module completed is a step toward better public service.
      </span>
      <small data-en="Employee Learning & Certification Portal" data-ur="ملازمین لرننگ اور سرٹیفیکیشن پورٹل">Employee Learning &amp; Certification Portal</small>
    </div>
    <div class="lang-toggle" style="align-self:flex-start;">
      <button data-lang="en" class="active">EN</button>
      <span style="opacity:.4">|</span>
      <button data-lang="ur">اردو</button>
    </div>
  </div>

  <div class="auth-form-col">
    <form class="auth-form" id="loginForm">
      <h1 data-en="Welcome back" data-ur="خوش آمدید">Welcome back</h1>
      <p data-en="Sign in with your assigned employee credentials." data-ur="اپنے مقرر کردہ ملازم کریڈینشلز سے سائن ان کریں۔">Sign in with your assigned employee credentials.</p>

      <div class="field">
        <label data-en="Employee ID" data-ur="ملازم آئی ڈی">Employee ID</label>
        <input type="text" placeholder="e.g. NDR-04521" required />
      </div>

      <div class="field">
        <label data-en="Password" data-ur="پاس ورڈ">Password</label>
        <input type="password" placeholder="Enter your password" required />
      </div>

      <button type="submit" class="btn block" data-en="Sign in" data-ur="سائن ان کریں">Sign in</button>

      <p class="auth-foot" data-en="Forgot your password? Contact your system administrator." data-ur="پاس ورڈ بھول گئے؟ اپنے سسٹم ایڈمنسٹریٹر سے رابطہ کریں۔">
        Forgot your password? Contact your system administrator.
      </p>

      <p class="auth-foot" data-en="New employee? Create an account." data-ur="نیا ملازم؟ اکاؤنٹ بنائیں۔">
        New employee? <a href="signup.html" style="color:var(--green-700);font-weight:600;">Create an account</a>
      </p>
    </form>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
