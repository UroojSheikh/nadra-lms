<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset Password — NADRA Digital Learning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500;600;700&family=Noto+Nastaliq+Urdu:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="auth-shell">
  <div class="auth-side">
    <div class="brand"><span class="dot"></span><span data-en="NADRA Digital Learning" data-ur="نادرا ڈیجیٹل لرننگ">NADRA Digital Learning</span></div>
    <div class="quote">
      <span data-en="We'll help you get back into your account safely."
            data-ur="ہم آپ کو محفوظ طریقے سے اپنے اکاؤنٹ میں واپس آنے میں مدد کریں گے۔">
        We'll help you get back into your account safely.
      </span>
      <small data-en="Employee Learning & Certification Portal" data-ur="ملازمین لرننگ اور سرٹیفیکیشن پورٹل">Employee Learning &amp; Certification Portal</small>
    </div>
    <div class="lang-toggle" style="align-self:flex-start;">
      <button data-lang="en" class="active">EN</button>
      <span style="opacity:.4">|</span>
      <button data-lang="ur">اردو</button>
    </div>
  </div>

  <div class="auth-form-col">
    <form class="auth-form" id="forgotPasswordForm" novalidate>
      <h1 data-en="Reset password" data-ur="پاس ورڈ ری سیٹ کریں">Reset password</h1>
      <p data-en="Enter your Employee ID and we'll send reset instructions to your registered email." data-ur="اپنی ملازم آئی ڈی درج کریں، ہم آپ کے رجسٹرڈ ای میل پر ری سیٹ ہدایات بھیجیں گے۔">Enter your Employee ID and we'll send reset instructions to your registered email.</p>

      <div class="field">
        <label data-en="Employee ID" data-ur="ملازم آئی ڈی">Employee ID</label>
        <input type="text" id="employeeId" placeholder="e.g. NDR-04521" required />
      </div>

      <button type="submit" class="btn block" data-en="Send reset link" data-ur="ری سیٹ لنک بھیجیں">Send reset link</button>

      <p class="auth-foot" data-en="Remembered your password? Sign in." data-ur="پاس ورڈ یاد آ گیا؟ سائن ان کریں۔">
        Remembered your password? <a href="index.html" style="color:var(--green-700);font-weight:600;">Sign in</a>
      </p>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="js/app.js"></script>
</body>
</html>
